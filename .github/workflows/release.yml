name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all targets
        run: |
          chmod +x scripts/build.sh
          VERSION="${GITHUB_REF_NAME}" scripts/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: dist/*

  universal:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: dist

      - name: Create macOS universal binary
        run: |
          chmod +x dist/openclaw-installer-darwin-amd64 dist/openclaw-installer-darwin-arm64
          lipo -create \
            dist/openclaw-installer-darwin-amd64 \
            dist/openclaw-installer-darwin-arm64 \
            -output dist/openclaw-installer-darwin-universal

      - name: Regenerate checksums
        run: |
          cd dist
          rm -f checksums.txt
          shasum -a 256 openclaw-installer-* > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-final
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: universal
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries-final
          path: dist

      - name: Determine pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" == *beta* || "${TAG}" == *rc* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
